<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minimal AR Arrow Navigation</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #111;
      color: white;
    }

    #setup {
      position: fixed;
      z-index: 10;
      top: 0;
      left: 0;
      right: 0;
      padding: 12px;
      background: rgba(0, 0, 0, 0.85);
    }

    input, button {
      width: 100%;
      box-sizing: border-box;
      margin: 4px 0;
      padding: 10px;
      font-size: 15px;
    }

    button {
      cursor: pointer;
      font-weight: 700;
    }

    #camera {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      background: black;
    }

    #arrowLayer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 110px;
    }

    #arrow {
      width: 90px;
      height: 160px;
      transform-origin: center center;
      transition: transform 0.12s linear;
      filter: drop-shadow(0 0 10px black);
    }

    #info {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 12px;
      background: rgba(0, 0, 0, 0.75);
      font-size: 14px;
      line-height: 1.5;
    }

    .small {
      font-size: 12px;
      opacity: 0.8;
    }
  </style>
</head>

<body>
  <video id="camera" autoplay playsinline></video>

  <div id="setup">
    <div class="small">현재 위치</div>
    <input id="curLat" placeholder="현재 위도 예: 37.5665" />
    <input id="curLng" placeholder="현재 경도 예: 126.9780" />

    <button id="gpsBtn">현재 위치 자동 입력</button>

    <div class="small">목적지</div>
    <input id="destLat" placeholder="목적지 위도 예: 37.5700" />
    <input id="destLng" placeholder="목적지 경도 예: 126.9820" />

    <button id="startBtn">카메라 + 화살표 시작</button>
  </div>

  <div id="arrowLayer">
    <svg id="arrow" viewBox="0 0 100 180">
      <polygon
        points="50,0 95,75 68,75 68,180 32,180 32,75 5,75"
        fill="lime"
        stroke="black"
        stroke-width="4"
      />
    </svg>
  </div>

  <div id="info">
    <div>목적지 방위각: <span id="bearingText">-</span>°</div>
    <div>휴대폰 방향: <span id="headingText">-</span>°</div>
    <div>화살표 회전각: <span id="deltaText">-</span>°</div>
    <div>거리: <span id="distanceText">-</span> m</div>
  </div>

  <script>
    const camera = document.getElementById("camera");
    const arrow = document.getElementById("arrow");

    const curLatInput = document.getElementById("curLat");
    const curLngInput = document.getElementById("curLng");
    const destLatInput = document.getElementById("destLat");
    const destLngInput = document.getElementById("destLng");

    const bearingText = document.getElementById("bearingText");
    const headingText = document.getElementById("headingText");
    const deltaText = document.getElementById("deltaText");
    const distanceText = document.getElementById("distanceText");

    let currentHeading = 0;
    let destinationBearing = 0;

    function toRad(deg) {
      return deg * Math.PI / 180;
    }

    function toDeg(rad) {
      return rad * 180 / Math.PI;
    }

    function normalize360(deg) {
      return (deg + 360) % 360;
    }

    function normalize180(deg) {
      return ((deg + 540) % 360) - 180;
    }

    // 현재 위치에서 목적지까지의 방위각 계산
    function calculateBearing(lat1, lng1, lat2, lng2) {
      const φ1 = toRad(lat1);
      const φ2 = toRad(lat2);
      const Δλ = toRad(lng2 - lng1);

      const y = Math.sin(Δλ) * Math.cos(φ2);
      const x =
        Math.cos(φ1) * Math.sin(φ2) -
        Math.sin(φ1) * Math.cos(φ2) * Math.cos(Δλ);

      return normalize360(toDeg(Math.atan2(y, x)));
    }

    // 두 좌표 사이 거리 계산
    function calculateDistance(lat1, lng1, lat2, lng2) {
      const R = 6371000;
      const φ1 = toRad(lat1);
      const φ2 = toRad(lat2);
      const Δφ = toRad(lat2 - lat1);
      const Δλ = toRad(lng2 - lng1);

      const a =
        Math.sin(Δφ / 2) ** 2 +
        Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ / 2) ** 2;

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    function updateArrow() {
      const curLat = parseFloat(curLatInput.value);
      const curLng = parseFloat(curLngInput.value);
      const destLat = parseFloat(destLatInput.value);
      const destLng = parseFloat(destLngInput.value);

      if (
        Number.isNaN(curLat) ||
        Number.isNaN(curLng) ||
        Number.isNaN(destLat) ||
        Number.isNaN(destLng)
      ) {
        return;
      }

      destinationBearing = calculateBearing(curLat, curLng, destLat, destLng);
      const distance = calculateDistance(curLat, curLng, destLat, destLng);

      const delta = normalize180(destinationBearing - currentHeading);

      arrow.style.transform = `rotate(${delta}deg)`;

      bearingText.textContent = destinationBearing.toFixed(1);
      headingText.textContent = currentHeading.toFixed(1);
      deltaText.textContent = delta.toFixed(1);
      distanceText.textContent = distance.toFixed(1);
    }

    async function startCamera() {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: "environment" }
        },
        audio: false
      });

      camera.srcObject = stream;
    }

    async function requestOrientationPermissionIfNeeded() {
      if (
        typeof DeviceOrientationEvent !== "undefined" &&
        typeof DeviceOrientationEvent.requestPermission === "function"
      ) {
        const result = await DeviceOrientationEvent.requestPermission();
        if (result !== "granted") {
          alert("방향 센서 권한이 필요합니다.");
          return false;
        }
      }

      return true;
    }

    function startCompass() {
      window.addEventListener("deviceorientation", (event) => {
        // iOS Safari 계열
        if (event.webkitCompassHeading !== undefined) {
          currentHeading = event.webkitCompassHeading;
        }
        // Android Chrome 계열
        else if (event.alpha !== null) {
          currentHeading = normalize360(360 - event.alpha);
        }

        updateArrow();
      });
    }

    document.getElementById("gpsBtn").addEventListener("click", () => {
      navigator.geolocation.getCurrentPosition(
        (position) => {
          curLatInput.value = position.coords.latitude;
          curLngInput.value = position.coords.longitude;
          updateArrow();
        },
        (error) => {
          alert("현재 위치를 가져오지 못했습니다: " + error.message);
        },
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0
        }
      );
    });

    document.getElementById("startBtn").addEventListener("click", async () => {
      try {
        await startCamera();

        const ok = await requestOrientationPermissionIfNeeded();
        if (!ok) return;

        startCompass();
        updateArrow();

        document.getElementById("setup").style.display = "none";
      } catch (error) {
        alert("실행 실패: " + error.message);
      }
    });

    setInterval(updateArrow, 300);
  </script>
</body>
</html>
